            </div>
            <div style={{display:"flex",overflowX:"auto",scrollbarWidth:"none"}}>
              {NAV_ITEMS.map(n=>(
                <button key={n.id} onClick={()=>navTo(n.id)}
                  style={{flex:"0 0 auto",background:"none",border:"none",color:tab===n.id?T.accent:T.muted,padding:"7px 13px 9px",fontSize:isT?11:10,fontWeight:tab===n.id?600:400,cursor:"pointer",borderBottom:`2px solid ${tab===n.id?T.accent:"transparent"}`,whiteSpace:"nowrap"}}>
                  {n.label}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Desktop top bar */}
        {isD&&(
          <div style={{background:T.sidebar,padding:"14px 26px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10,boxShadow:`0 1px 4px ${T.sh}`,transition:"background .3s"}}>
            <div>
              <div style={{fontSize:18,fontWeight:700,color:T.text}}>{NAV_ITEMS.find(n=>n.id===tab)?.label||"Dashboard"}</div>
              <div style={{fontSize:11,color:T.muted,marginTop:1}}>{dstr}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>setShowAbout(true)} style={{background:T.card2,border:`1px solid ${T.border}`,color:T.muted,borderRadius:8,padding:"7px 12px",fontSize:13,cursor:"pointer"}}>ℹ️</button>
              <button onClick={()=>setShowRpt(true)} style={{background:T.card2,border:`1px solid ${T.border}`,color:T.dim,borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:500,cursor:"pointer"}}>↓ Report</button>
              <div style={{background:T.card2,border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 14px"}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:15,fontWeight:600,color:T.accent}}>{clock}</span>
              </div>
            </div>
          </div>
        )}

        {/* Content */}
        <div style={{flex:1,overflowY:"auto",padding:isD?"24px 26px 40px":isT?"16px 16px 80px":"12px 12px 80px"}}>
          {!ready
            ? <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:200,gap:12}}><div style={{fontSize:24,opacity:.4}}>⏳</div><div style={{fontSize:13,color:T.muted}}>Loading…</div></div>
            : PANELS[tab]
          }
        </div>
      </div>

      {/* ══════════ MODALS ══════════ */}
      <Modal show={showTx} onClose={()=>setShowTx(false)} title="New Transaction" T={T}>
        <div style={{display:"flex",background:T.card2,borderRadius:8,padding:3,marginBottom:14,gap:3}}>
          {["expense","income"].map(t=>(
            <button key={t} onClick={()=>setTxF(f=>({...f,type:t,category:t==="expense"?"food":"salary"}))}
              style={{flex:1,background:txF.type===t?(t==="expense"?T.red:T.green):"transparent",border:"none",color:txF.type===t?"#fff":T.sub,borderRadius:6,padding:"9px 0",fontSize:13,fontWeight:600,cursor:"pointer"}}>
              {t==="expense"?"▼  Expense":"▲  Income"}
            </button>
          ))}
        </div>
        <Field T={T} label={`Amount (${cur.sym})`}>
          <TxtIn dark={dark} value={txF.amount} onChange={e=>setTxF(f=>({...f,amount:e.target.value}))} type="number" placeholder="0.00" mono large/>
        </Field>
        <Field T={T} label="Note">
          <TxtIn dark={dark} value={txF.note} onChange={e=>setTxF(f=>({...f,note:e.target.value}))} placeholder="What was this for?"/>
        </Field>
        <Field T={T} label="Date">
          <TxtIn dark={dark} value={txF.date} onChange={e=>setTxF(f=>({...f,date:e.target.value}))} type="date"/>
        </Field>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:7}}>Category</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {(txF.type==="expense"?EXP_CATS:INC_CATS).map(cat=>(
              <Chip key={cat.id} active={txF.category===cat.id} color={cat.color} onClick={()=>setTxF(f=>({...f,category:cat.id}))}>{cat.icon} {cat.label}</Chip>
            ))}
          </div>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:7}}>Account</div>
          <div style={{display:"flex",gap:6}}>
            {ACCOUNTS.map(acc=>(
              <Chip key={acc.id} active={txF.account===acc.id} color={acc.color} onClick={()=>setTxF(f=>({...f,account:acc.id}))}>{acc.icon} {acc.label}</Chip>
            ))}
          </div>
        </div>
        <PBtn T={T} onClick={addTx}>Save Transaction</PBtn>
      </Modal>

      <Modal show={!!assMod} onClose={()=>setAssMod(null)} title={assMod==="add"?"Add Asset":"Edit Asset"} width={500} T={T}>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:7}}>Asset Type</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {ASSET_TYPES.map(at=><Chip key={at.id} active={assF.type===at.id} color={at.color} onClick={()=>af("type",at.id)}>{at.icon} {at.label}</Chip>)}
          </div>
        </div>
        <Field T={T} label="Asset Name"><TxtIn dark={dark} value={assF.name} onChange={e=>af("name",e.target.value)} placeholder="Asset name"/></Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Field T={T} label={`Current Value (${cur.sym})`}><TxtIn dark={dark} value={assF.value} onChange={e=>af("value",e.target.value)} type="number" placeholder="0.00" mono/></Field>
          <Field T={T} label={`Purchase Price (${cur.sym})`}><TxtIn dark={dark} value={assF.cost} onChange={e=>af("cost",e.target.value)} type="number" placeholder="0.00" mono/></Field>
        </div>
        {["fd","sav"].includes(assF.type)&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Field T={T} label="Interest Rate %"><TxtIn dark={dark} value={assF.rate} onChange={e=>af("rate",e.target.value)} type="number" placeholder="0.0" mono/></Field>
            <Field T={T} label="Bank"><TxtIn dark={dark} value={assF.bank} onChange={e=>af("bank",e.target.value)} placeholder="Bank name"/></Field>
          </div>
        )}
        {assF.type==="fd"   &&<Field T={T} label="Maturity Date"><TxtIn dark={dark} value={assF.mDate} onChange={e=>af("mDate",e.target.value)} type="date"/></Field>}
        {assF.type==="prop" &&<Field T={T} label="Location"><TxtIn dark={dark} value={assF.loc} onChange={e=>af("loc",e.target.value)} placeholder="e.g. Colombo 3"/></Field>}
        {assF.type==="car"  &&<Field T={T} label="Year / Model"><TxtIn dark={dark} value={assF.yr} onChange={e=>af("yr",e.target.value)} placeholder="e.g. 2021 Toyota"/></Field>}
        {assF.type==="stock"&&<Field T={T} label="Broker"><TxtIn dark={dark} value={assF.broker} onChange={e=>af("broker",e.target.value)} placeholder="e.g. First Capital"/></Field>}
        {assF.type==="crypto"&&<Field T={T} label="Wallet"><TxtIn dark={dark} value={assF.wallet} onChange={e=>af("wallet",e.target.value)} placeholder="e.g. Binance"/></Field>}
        {assF.type==="gold" &&<Field T={T} label="Purity / Details"><TxtIn dark={dark} value={assF.purity} onChange={e=>af("purity",e.target.value)} placeholder="e.g. 22K 50g"/></Field>}
        <Field T={T} label="Start Date"><TxtIn dark={dark} value={assF.start} onChange={e=>af("start",e.target.value)} type="date"/></Field>
        <Field T={T} label="Notes"><TxtIn dark={dark} value={assF.notes} onChange={e=>af("notes",e.target.value)} placeholder="Optional notes"/></Field>
        <PBtn T={T} onClick={saveAss} color={getAT(assF.type).color}>{assMod==="add"?"Add Asset":"Save Changes"}</PBtn>
      </Modal>

      <Modal show={!!liabMod} onClose={()=>setLiabMod(null)} title={liabMod==="add"?"Add Liability":"Edit Liability"} width={500} T={T}>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:7}}>Liability Type</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {LIAB_TYPES.map(lt=><Chip key={lt.id} active={liabF.type===lt.id} color={lt.color} onClick={()=>lf("type",lt.id)}>{lt.icon} {lt.label}</Chip>)}
          </div>
        </div>
        <Field T={T} label="Name / Lender"><TxtIn dark={dark} value={liabF.name} onChange={e=>lf("name",e.target.value)} placeholder="e.g. BOC Home Loan"/></Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Field T={T} label={`Total Amount (${cur.sym})`}><TxtIn dark={dark} value={liabF.total} onChange={e=>lf("total",e.target.value)} type="number" placeholder="0.00" mono/></Field>
          <Field T={T} label={`Remaining (${cur.sym})`}><TxtIn dark={dark} value={liabF.remaining} onChange={e=>lf("remaining",e.target.value)} type="number" placeholder="0.00" mono/></Field>
          <Field T={T} label={`Monthly Payment (${cur.sym})`}><TxtIn dark={dark} value={liabF.monthly} onChange={e=>lf("monthly",e.target.value)} type="number" placeholder="0.00" mono/></Field>
          <Field T={T} label="Interest Rate %"><TxtIn dark={dark} value={liabF.rate} onChange={e=>lf("rate",e.target.value)} type="number" placeholder="0.0" mono/></Field>
        </div>
        <Field T={T} label="Start Date"><TxtIn dark={dark} value={liabF.start} onChange={e=>lf("start",e.target.value)} type="date"/></Field>
        <Field T={T} label="Notes"><TxtIn dark={dark} value={liabF.notes} onChange={e=>lf("notes",e.target.value)} placeholder="Optional notes"/></Field>
        <PBtn T={T} onClick={saveLiab} color={T.red}>{liabMod==="add"?"Add Liability":"Save Changes"}</PBtn>
      </Modal>

      <Modal show={!!editBdg} onClose={()=>setEditBdg(null)} title={`Budget — ${EXP_CATS.find(c=>c.id===editBdg)?.label||""}`} width={340} T={T}>
        <Field T={T} label={`Monthly Budget (${cur.sym})`}>
          <input ref={bdgRef} type="number" defaultValue={bdg[editBdg]||""} placeholder="0.00"
            style={{background:"transparent",border:"none",outline:"none",color:T.text,fontSize:26,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,width:"100%"}}/>
        </Field>
        <div style={{display:"flex",gap:10,marginTop:4}}>
          <button onClick={()=>setEditBdg(null)} style={{flex:1,background:T.card2,border:`1px solid ${T.border}`,color:T.sub,borderRadius:10,padding:11,fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>{setBdg(b=>({...b,[editBdg]:+(bdgRef.current?.value)||0}));setEditBdg(null);}} style={{flex:1,background:T.accent,border:"none",color:"#fff",borderRadius:10,padding:11,fontSize:13,fontWeight:600,cursor:"pointer"}}>Save</button>
        </div>
      </Modal>

      <Modal show={showCur} onClose={()=>setShowCur(false)} title="Select Currency" width={440} T={T}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {CURRENCIES.map(c=>(
            <button key={c.code} onClick={()=>{setCur(c);setShowCur(false);}}
              style={{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",background:cur.code===c.code?T.accent+"18":T.card2,border:`1px solid ${cur.code===c.code?T.accent:T.border}`,borderRadius:10,color:T.text,cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
              <span style={{fontSize:20}}>{c.flag}</span>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:cur.code===c.code?T.accent:T.text}}>{c.code} ({c.sym})</div>
                <div style={{fontSize:10,color:T.muted}}>{c.name}</div>
              </div>
            </button>
          ))}
        </div>
      </Modal>

      <Modal show={showRpt} onClose={()=>setShowRpt(false)} title="Generate Report" width={400} T={T}>
        <p style={{fontSize:12,color:T.dim,lineHeight:1.6,margin:"0 0 16px"}}>Full financial report: P&L, Balance Sheet, expense breakdown, and transaction log.</p>
        <Field T={T} label="From Date"><TxtIn dark={dark} value={rptFrom} onChange={e=>setRptFrom(e.target.value)} type="date"/></Field>
        <Field T={T} label="To Date"><TxtIn dark={dark} value={rptTo} onChange={e=>setRptTo(e.target.value)} type="date"/></Field>
        <div style={{background:T.card2,border:`1px solid ${T.border}`,borderRadius:9,padding:"9px 13px",marginBottom:12,fontSize:11,color:T.muted}}>{cur.flag} {cur.code} — {cur.name}</div>
        <PBtn T={T} onClick={()=>{setRptTxt(buildReport({txns,assets,liabs,budgets:bdg,from:rptFrom,to:rptTo,cur}));setShowRpt(false);setShowRptV(true);}}>
          Generate Report
        </PBtn>
      </Modal>

      <Modal show={showRptV} onClose={()=>setShowRptV(false)} title="Financial Report" width={700} T={T}>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <button onClick={()=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([rptTxt],{type:"text/plain"}));a.download=`moneyflow-${rptFrom}-${rptTo}.txt`;a.click();}} style={{background:T.green+"18",border:`1px solid ${T.green}40`,color:T.green,borderRadius:8,padding:"6px 16px",fontSize:12,fontWeight:600,cursor:"pointer"}}>↓ Download</button>
          <button onClick={()=>navigator.clipboard?.writeText(rptTxt)} style={{background:T.card2,border:`1px solid ${T.border}`,color:T.sub,borderRadius:8,padding:"6px 16px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Copy</button>
        </div>
        <pre style={{background:T.card2,border:`1px solid ${T.border}`,borderRadius:10,padding:14,fontSize:10.5,color:T.dim,fontFamily:"'JetBrains Mono',monospace",overflowX:"auto",whiteSpace:"pre",lineHeight:1.7,maxHeight:420,overflowY:"auto",margin:0}}>
          {rptTxt}
        </pre>
      </Modal>

      <Modal show={!!delConf} onClose={()=>setDelConf(null)} title="Confirm Delete" width={320} T={T}>
        <div style={{textAlign:"center",padding:"4px 0 16px"}}>
          <div style={{fontSize:36,marginBottom:10}}>🗑️</div>
          <p style={{fontSize:13,color:T.dim,lineHeight:1.6,margin:0}}>Delete this {delConf?.t==="ass"?"asset":"liability"}? This cannot be undone.</p>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setDelConf(null)} style={{flex:1,background:T.card2,border:`1px solid ${T.border}`,color:T.sub,borderRadius:10,padding:11,fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
          <button onClick={doDelete} style={{flex:1,background:T.red,border:"none",color:"#fff",borderRadius:10,padding:11,fontSize:13,fontWeight:700,cursor:"pointer"}}>Delete</button>
        </div>
      </Modal>

      <Modal show={showBackup} onClose={()=>{setShowBackup(false);setDriveFiles(null);}} title="💾 Storage & Backup" width={520} T={T}>
        <div style={{display:"flex",flexDirection:"column",gap:0}}>
          {backup.status==="working"&&<div style={{background:T.amber+"18",border:`1px solid ${T.amber}40`,borderRadius:10,padding:"11px 14px",fontSize:12,color:T.amber,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>⏳ {backup.msg}</div>}
          {backup.status==="done"   &&<div style={{background:T.green+"18",border:`1px solid ${T.green}40`,borderRadius:10,padding:"11px 14px",fontSize:12,color:T.green,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>✓ {backup.msg}</div>}
          {backup.status==="error"  &&<div style={{background:T.red+"18",border:`1px solid ${T.red}40`,  borderRadius:10,padding:"11px 14px",fontSize:12,color:T.red,  marginBottom:14,display:"flex",alignItems:"center",gap:8}}>⚠️ {backup.msg}</div>}
          <div style={{marginBottom:22}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <div style={{width:26,height:26,background:T.accent+"20",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>📱</div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:T.text}}>1. Local Storage (Default)</div>
                <div style={{fontSize:10,color:T.muted}}>Always active — works offline</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
              {[["📝",txns.length,"Transactions"],["💎",assets.length,"Assets"],["⚖️",liabs.length,"Liabilities"],["📊",Object.keys(bdg).length,"Budgets"]].map(([icon,n,label])=>(
                <div key={label} style={{background:T.accent+"0d",border:`1px solid ${T.accent}20`,borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
                  <div style={{fontSize:20,marginBottom:4}}>{icon}</div>
                  <div style={{fontWeight:800,fontSize:18,color:T.accent,fontFamily:"'JetBrains Mono',monospace"}}>{n}</div>
                  <div style={{color:T.muted,fontSize:9,marginTop:2}}>{label}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{borderTop:`1px solid ${T.border}`,paddingTop:18,marginBottom:22}}>
            <div style={{background:T.card2,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px",marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:700,color:T.text,marginBottom:8}}>📊 Excel / CSV Exports</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <button onClick={backup.exportExcel}
                  style={{display:"flex",alignItems:"center",justifyContent:"center",gap:7,padding:"11px",background:"#21734620",border:"1px solid #21734650",borderRadius:9,color:"#217346",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                  📊 Download Excel (.xlsx)
                </button>
                <button onClick={backup.emailExport}
                  style={{display:"flex",alignItems:"center",justifyContent:"center",gap:7,padding:"11px",background:T.teal+"18",border:`1px solid ${T.teal}45`,borderRadius:9,color:T.teal,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                  ✉️ Send via Email
                </button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                {[["transactions","📝 Transactions"],["assets","💎 Assets"],["liabilities","⚖️ Liabilities"]].map(([s,label])=>(
                  <button key={s} onClick={()=>backup.exportCSV(s)}
                    style={{padding:"8px 4px",background:T.card,border:`1px solid ${T.border}`,borderRadius:8,color:T.sub,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit",lineHeight:1.4}}>
                    {label}<br/><span style={{color:T.muted,fontSize:9}}>CSV</span>
                  </button>
                ))}
              </div>
            </div>
            <div style={{background:T.card2,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px"}}>
              <div style={{fontSize:12,fontWeight:700,color:T.text,marginBottom:8}}>🗂️ Manual Backup File (.fbsbak)</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <button onClick={backup.createBackup}
                  style={{display:"flex",alignItems:"center",justifyContent:"center",gap:7,padding:"11px",background:T.accent+"18",border:`1px solid ${T.accent}45`,borderRadius:9,color:T.accent,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                  ⬇️ Create Backup
                </button>
                <button onClick={()=>fileInputRef.current?.click()}
                  style={{display:"flex",alignItems:"center",justifyContent:"center",gap:7,padding:"11px",background:T.purple+"15",border:`1px solid ${T.purple}40`,borderRadius:9,color:T.purple,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                  ⬆️ Restore Backup
                </button>
              </div>
              <input ref={fileInputRef} type="file" accept=".fbsbak,.json" style={{display:"none"}}

          </div>

        <div style={{textAlign:"center",padding:"4px 0 8px"}}>
          <div style={{position:"relative",width:88,height:88,margin:"0 auto 18px"}}>
            <div style={{width:88,height:88,background:`linear-gradient(145deg,${T.accent},${T.purple})`,borderRadius:24,display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,color:"#fff",boxShadow:`0 8px 28px ${T.accent}55`}}>₿</div>
            <div style={{position:"absolute",bottom:-4,right:-4,background:T.green,borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",boxShadow:`0 2px 8px ${T.green}66`}}>✓</div>
          </div>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      // Inline service worker as a blob to avoid needing a separate file
      const swCode = `
        const CACHE = 'fbs-v1';
        const ASSETS = [self.location.href];
        self.addEventListener('install', e => {
          e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
          self.skipWaiting();
        });
        self.addEventListener('activate', e => {
          e.waitUntil(caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
          ));
          self.clients.claim();
        });
        self.addEventListener('fetch', e => {
          e.respondWith(
            caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match(e.request)))
          );
        });
      `;
      const blob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }
  </script>
