/* ─────────────────────────────────────────────────────────────
   INLINED: useBackup hook
───────────────────────────────────────────────────────────── */
let _XLSX = null;
async function _getXLSX() {
  if (_XLSX) return _XLSX;
  return new Promise((resolve, reject) => {
    if (window.XLSX) { _XLSX = window.XLSX; resolve(_XLSX); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload  = () => { _XLSX = window.XLSX; resolve(_XLSX); };
    s.onerror = () => reject(new Error('Failed to load SheetJS'));
    document.head.appendChild(s);
  });
}
function _downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href: url, download: filename });
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
}
function _serialise({ txns, assets, liabs, bdg, curCode, dark }) {
  return { version: '1.0.0', app: 'Finance by Self', exportedAt: new Date().toISOString(),
    data: { txns, assets, liabs, bdg, curCode, dark } };
}
function useBackup({ txns, assets, liabs, bdg, curCode, dark,
                     setTxns, setAssets, setLiabs, setBdg, setCur, setDark,
                     getCur }) {
  const [status, setStatus] = useState('');
  const [msg, setMsg]    = useState('');
  const report = (type, text) => { setStatus(type); setMsg(text); setTimeout(() => setStatus(''), 4000); };

  const createBackup = useCallback(async () => {
    try {
      const payload = JSON.stringify(_serialise({ txns, assets, liabs, bdg, curCode, dark }), null, 2);
      const date = new Date().toISOString().slice(0, 10);
      _downloadBlob(new Blob([payload], { type: 'application/json' }), `finance-by-self-${date}.fbsbak`);
      report('done', 'Backup file downloaded ✓');
    } catch (e) { report('error', `Backup failed: ${e.message}`); }
  }, [txns, assets, liabs, bdg, curCode, dark]);

  const restoreBackup = useCallback((file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        const d = parsed.data || parsed;
        if (d.txns)   setTxns(d.txns);
        if (d.assets) setAssets(d.assets);
        if (d.liabs)  setLiabs(d.liabs);
        if (d.bdg)    setBdg(d.bdg);
        if (d.curCode) setCur(getCur(d.curCode));
        if (d.dark !== undefined) setDark(d.dark);
        report('done', `Restored from ${file.name} ✓`);
      } catch (e) { report('error', 'Invalid backup file. Please use a .fbsbak file.'); }
    };
    reader.onerror = () => report('error', 'Could not read file.');
    reader.readAsText(file);
  }, [setTxns, setAssets, setLiabs, setBdg, setCur, setDark, getCur]);

  const exportExcel = useCallback(async () => {
    try {
      report('working', 'Building Excel file…');
      const XL = await _getXLSX();
      const wb = XL.utils.book_new();
      const sheets = {
        Transactions: txns.map(t => ({ ID: t.id, Type: t.type, Category: t.category, Account: t.account, Amount: t.amount, Note: t.note, Date: t.date })),
        Assets: assets.map(a => ({ ID: a.id, Type: a.type, Name: a.name, 'Current Value': a.value, 'Purchase Price': a.cost || '', 'Interest Rate %': a.rate || '', 'Maturity Date': a.mDate || '', Bank: a.bank || '', 'Start Date': a.start, Notes: a.notes || '' })),
        Liabilities: liabs.map(l => ({ ID: l.id, Type: l.type, Name: l.name, 'Total Amount': l.total, Remaining: l.remaining, 'Monthly Payment': l.monthly, 'Interest Rate %': l.rate, 'Start Date': l.start, Notes: l.notes || '' })),
        Budgets: Object.entries(bdg).map(([cat, amt]) => ({ Category: cat, 'Budget Amount': amt })),
        Summary: [
          { Key: 'Total Income (period)',   Value: txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0) },
          { Key: 'Total Expenses (period)', Value: txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0) },
          { Key: 'Total Asset Value',       Value: assets.reduce((s,a)=>s+a.value,0) },
          { Key: 'Total Liabilities',       Value: liabs.reduce((s,l)=>s+l.remaining,0) },
          { Key: 'Currency',                Value: curCode },
          { Key: 'Exported At',             Value: new Date().toLocaleString() },
          { Key: 'App',                     Value: 'Finance by Self v1.0.0' },
        ],
      };
      Object.entries(sheets).forEach(([name, data]) => {
        const ws = XL.utils.json_to_sheet(data);
        const cols = data[0] ? Object.keys(data[0]).map(k => ({ wch: Math.max(k.length, 12) })) : [];
        ws['!cols'] = cols;
        XL.utils.book_append_sheet(wb, ws, name);
      });
      const date = new Date().toISOString().slice(0, 10);
      XL.writeFile(wb, `Finance-by-Self-${date}.xlsx`);
      report('done', 'Excel file downloaded ✓');
    } catch (e) { report('error', `Excel export failed: ${e.message}`); }
  }, [txns, assets, liabs, bdg, curCode]);

  const exportCSV = useCallback((sheetName = 'transactions') => {
    try {
      const sources = {
        transactions: { data: txns, keys: ['id','type','category','account','amount','note','date'] },
        assets:       { data: assets, keys: ['id','type','name','value','cost','rate','mDate','bank','start','notes'] },
        liabilities:  { data: liabs,  keys: ['id','type','name','total','remaining','monthly','rate','start','notes'] },
      };
      const src = sources[sheetName]; if (!src) return;
      const header = src.keys.join(',');
      const rows = src.data.map(row => src.keys.map(k => { const v = String(row[k] ?? ''); return v.includes(',') || v.includes('"') ? `"${v.replace(/"/g,'""')}"` : v; }).join(','));
      const csv  = [header, ...rows].join('\n');
      const date = new Date().toISOString().slice(0, 10);
      _downloadBlob(new Blob([csv], { type: 'text/csv' }), `finance-${sheetName}-${date}.csv`);
      report('done', `CSV exported (${src.data.length} rows) ✓`);
    } catch (e) { report('error', `CSV export failed: ${e.message}`); }
  }, [txns, assets, liabs]);

  const emailExport = useCallback(() => {
    const subject = encodeURIComponent('Finance by Self — Data Export');
    const body = encodeURIComponent(`Hi,\n\nFinance by Self data:\nTransactions: ${txns.length}\nAssets: ${assets.length}\nLiabilities: ${liabs.length}\n\nGenerated: ${new Date().toLocaleString()}`);
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
    report('done', 'Email client opened.');
  }, [txns, assets, liabs]);

  const backupToDrive   = useCallback(() => report('error', 'Sign in with Google to enable Drive backup.'), []);
  const restoreFromDrive= useCallback(() => report('error', 'Sign in with Google to restore from Drive.'), []);
  const downloadDriveFile=useCallback(() => {}, []);

  return { status, msg, createBackup, restoreBackup, exportExcel, exportCSV, emailExport, backupToDrive, restoreFromDrive, downloadDriveFile };
}

function buildReport({txns,assets,liabs,budgets,from,to,cur}){
  const f = n => fmtAmt(n, cur);
  const ts = txns.filter(t=>t.date>=from&&t.date<=to);
  const inc = ts.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const exp = ts.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const tA  = assets.reduce((s,a)=>s+a.value,0);
  const tL  = liabs.reduce((s,l)=>s+l.remaining,0);
  const ec={}, ic={};
  ts.filter(t=>t.type==="expense").forEach(t=>{ec[t.category]=(ec[t.category]||0)+t.amount;});
  ts.filter(t=>t.type==="income").forEach(t=>{ic[t.category]=(ic[t.category]||0)+t.amount;});
  const HR="─".repeat(64);
  return [
    `╔${"═".repeat(62)}╗`,
    `║${"  Finance by Self — Personal Financial Report".padEnd(62)}║`,
    `║  Period: ${from} → ${to}`.padEnd(63)+"║",
    `║  Currency: ${cur.code}`.padEnd(63)+"║",
    `║  Generated: ${new Date().toLocaleString()}`.padEnd(63)+"║",
    `╚${"═".repeat(62)}╝`,
    "",HR,"  P&L SUMMARY",HR,
    `  Income      ${f(inc).padStart(24)}`,
    `  Expenses    ${f(exp).padStart(24)}`,
    `  ─────────────────────`,
    `  Net         ${f(inc-exp).padStart(24)}  ${inc>=exp?"▲ PROFIT":"▼ LOSS"}`,
    `  Savings     ${(inc>0?(((inc-exp)/inc)*100).toFixed(1)+"%":"—").padStart(24)}`,
    "",HR,"  INCOME",HR,
    ...INC_CATS.filter(c=>ic[c.id]).map(c=>`  ${c.label.padEnd(28)} ${f(ic[c.id]).padStart(14)}`),
    "",HR,"  EXPENSES",HR,
    ...EXP_CATS.filter(c=>ec[c.id]).map(c=>{
      const b=budgets[c.id]||0;
      return `  ${c.label.padEnd(24)} ${f(ec[c.id]).padStart(14)}  Budg:${b?f(b):"—"}  Used:${b?((ec[c.id]/b)*100).toFixed(0)+"%":"—"}`;
    }),
    "",HR,"  BALANCE SHEET",HR,
    "  ASSETS",...assets.map(a=>`    ${(getAT(a.type).label+" "+a.name).padEnd(40)} ${f(a.value).padStart(14)}`),
    `  Total Assets ${f(tA).padStart(20)}`,
    "","  LIABILITIES",...liabs.map(l=>`    ${(getLT(l.type).label+" "+l.name).padEnd(40)} ${f(l.remaining).padStart(14)}`),
    `  Total Liab.  ${f(tL).padStart(20)}`,
    `  Net Worth    ${f(tA-tL).padStart(20)}`,
    "",HR,"  TRANSACTIONS",HR,
    ...ts.sort((a,b)=>a.date.localeCompare(b.date))
       .map(t=>`  ${t.date}  ${t.type.padEnd(8)}  ${getCat(t.type,t.category).label.padEnd(20)}  ${t.type==="income"?"+":"-"}${f(t.amount)}`),
    "",HR,`  Finance by Self  •  Generated ${new Date().toLocaleDateString()}  •  v1.0.0`,HR,
  ].join("\n");
}

/* ─────────────────────────────────────────────────────────────
   STORAGE HELPERS (window.storage or in-memory fallback)
───────────────────────────────────────────────────────────── */
async function storageGet(key) {
  try { return localStorage.getItem(key); } catch(_) { return null; }
}
async function storageSet(key, value) {
  try { localStorage.setItem(key, value); } catch(_) {}
}

/* ─────────────────────────────────────────────────────────────
   MAIN APP
───────────────────────────────────────────────────────────── */
function App({ dark: darkProp, setDark: setDarkProp }){
  const[bp,setBp]=useState(()=>window.innerWidth>=1100?"D":window.innerWidth>=640?"T":"M");
  useEffect(()=>{
    const h=()=>setBp(window.innerWidth>=1100?"D":window.innerWidth>=640?"T":"M");
    window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);
  },[]);
  const isD=bp==="D", isT=bp==="T";

  const dark = darkProp ?? false;
  const setDark = setDarkProp ?? (() => {});
  const T=dark?DARK:LIGHT;

  const { status: sheetsStatus, syncToSheets, syncFromSheets, sheetsUrl, connect: connectSheets } = useGoogleSheets(null);
  const [sheetsBar, setSheetsBar] = useState(false);

  const[now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  const clock=now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:true});
  const dstr=now.toLocaleDateString("en-US",{weekday:"short",year:"numeric",month:"short",day:"numeric"});

  const user = null;
  const sk = "mf-guest";

  const[txns,setTxns]     =useState(()=>SEED_TXN);
  const[liabs,setLiabs]   =useState(()=>SEED_LIAB);
  const[assets,setAssets] =useState(()=>SEED_ASSETS);
  const[bdg,setBdg]       =useState(()=>SEED_BDG);
  const[cur,setCur]       =useState(()=>getCur("LKR"));
  const[ready,setReady]   =useState(false);

  const fmt=n=>fmtAmt(n,cur);

  useEffect(()=>{
    storageGet(sk).then(raw=>{
      if(raw){
        try{
          const d=JSON.parse(raw);
          if(d.txns)   setTxns(d.txns);
          if(d.liabs)  setLiabs(d.liabs);
          if(d.assets) setAssets(d.assets);
          if(d.bdg)    setBdg(d.bdg);
          if(d.curCode)setCur(getCur(d.curCode));
          if(d.dark!==undefined)setDark(d.dark);
        }catch(_){}
      }
      setReady(true);
    });
  // eslint-disable-next-line
  },[sk]);

  useEffect(()=>{
    if(!ready)return;
    storageSet(sk,JSON.stringify({txns,liabs,assets,bdg,curCode:cur.code,dark}));
  },[txns,liabs,assets,bdg,cur,dark,sk,ready]);

  const[rMode,setRMode]=useState("month");
  const[rMonth,setRMonth]=useState(CM);
  const[rFrom,setRFrom]=useState(()=>{const d=new Date();d.setDate(1);return d.toISOString().slice(0,10);});
  const[rTo,setRTo]=useState(todayStr);

  const{dFrom,dTo}=useMemo(()=>{
    if(rMode==="custom")return{dFrom:rFrom,dTo:rTo};
    const y=CY,m=rMonth;
    if(rMode==="month"){
      const from=`${y}-${String(m+1).padStart(2,"0")}-01`;
      const to=`${y}-${String(m+1).padStart(2,"0")}-${new Date(y,m+1,0).getDate()}`;
      return{dFrom:from,dTo:to};
    }
    if(rMode==="quarter"){
      const q=Math.floor(m/3)*3;
      const from=`${y}-${String(q+1).padStart(2,"0")}-01`;
      const to=`${y}-${String(q+3).padStart(2,"0")}-${new Date(y,q+3,0).getDate()}`;
      return{dFrom:from,dTo:to};
    }
    return{dFrom:`${y}-01-01`,dTo:`${y}-12-31`};
  },[rMode,rMonth,rFrom,rTo]);

  const rLabel=useMemo(()=>{
    if(rMode==="custom")return`${rFrom} → ${rTo}`;
    if(rMode==="month")return`${FMONTHS[rMonth]} ${CY}`;
    if(rMode==="quarter")return`Q${Math.floor(rMonth/3)+1} ${CY}`;
    return`Full Year ${CY}`;
  },[rMode,rMonth,rFrom,rTo]);

  const[tab,setTab]         =useState("dash");
  const[showTx,setShowTx]   =useState(false);
  const[txF,setTxF]         =useState(()=>({type:"expense",category:"food",account:"cash",amount:"",note:"",date:todayStr()}));
  const[liabMod,setLiabMod] =useState(null);
  const[liabF,setLiabF]     =useState(()=>({type:"loan",name:"",total:"",remaining:"",monthly:"",rate:"",start:todayStr(),notes:""}));
  const[liabDet,setLiabDet] =useState(null);
  const[assMod,setAssMod]   =useState(null);
  const[assF,setAssF]       =useState(()=>({type:"fd",name:"",value:"",cost:"",rate:"",mDate:"",bank:"",start:todayStr(),notes:"",loc:"",broker:"",wallet:"",purity:"",yr:""}));
  const[assDet,setAssDet]   =useState(null);
  const[editBdg,setEditBdg] =useState(null);
  const[delConf,setDelConf] =useState(null);
  const[showCur,setShowCur] =useState(false);
  const[showRpt,setShowRpt] =useState(false);
  const[rptFrom,setRptFrom] =useState(()=>{const d=new Date();d.setDate(1);return d.toISOString().slice(0,10);});
  const[rptTo,setRptTo]     =useState(todayStr);
  const[rptTxt,setRptTxt]   =useState("");
  const[showRptV,setShowRptV]=useState(false);
  const[showAbout,setShowAbout]=useState(false);
  const[showBackup,setShowBackup]=useState(false);
  const[driveFiles,setDriveFiles]=useState(null);
  const fileInputRef=useRef(null);
  const bdgRef=useRef(null);

  const fTxns=useMemo(()=>txns.filter(t=>t.date>=dFrom&&t.date<=dTo),[txns,dFrom,dTo]);
  const totInc=useMemo(()=>fTxns.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0),[fTxns]);
  const totExp=useMemo(()=>fTxns.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0),[fTxns]);
  const netCF=totInc-totExp;
  const savR=totInc>0?(netCF/totInc)*100:0;
  const expBC=useMemo(()=>{const m={};fTxns.filter(t=>t.type==="expense").forEach(t=>{m[t.category]=(m[t.category]||0)+t.amount;});return m;},[fTxns]);
  const grpTxns=useMemo(()=>{const m={};fTxns.forEach(t=>{if(!m[t.date])m[t.date]=[];m[t.date].push(t);});return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));},[fTxns]);
  const acBal=useMemo(()=>{const m={};ACCOUNTS.forEach(a=>m[a.id]=0);txns.forEach(t=>{m[t.account]+=(t.type==="income"?t.amount:-t.amount);});return m;},[txns]);
  const totCash=useMemo(()=>Object.values(acBal).reduce((s,v)=>s+v,0),[acBal]);
  const totAss=useMemo(()=>assets.reduce((s,a)=>s+a.value,0),[assets]);
  const totLiab=useMemo(()=>liabs.reduce((s,l)=>s+l.remaining,0),[liabs]);
  const totGain=useMemo(()=>assets.reduce((s,a)=>s+(a.value-(a.cost||a.value)),0),[assets]);
  const totMoPay=useMemo(()=>liabs.reduce((s,l)=>s+l.monthly,0),[liabs]);
  const netWorth=totCash+totAss-totLiab;
  const equity=totCash+totAss-totLiab;

  const mPnl=useMemo(()=>MONTHS.map((_,mi)=>{
    const t=txns.filter(t=>{const d=new Date(t.date);return d.getMonth()===mi&&d.getFullYear()===CY;});
    const i=t.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
    const e=t.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
    return{m:MONTHS[mi],i,e,n:i-e};
  }),[txns]);
  const ytdI=useMemo(()=>mPnl.reduce((s,m)=>s+m.i,0),[mPnl]);
  const ytdE=useMemo(()=>mPnl.reduce((s,m)=>s+m.e,0),[mPnl]);
  const ytdN=ytdI-ytdE;
  const incBCYr=useMemo(()=>{const m={};txns.filter(t=>t.type==="income"&&new Date(t.date).getFullYear()===CY).forEach(t=>{m[t.category]=(m[t.category]||0)+t.amount;});return m;},[txns]);
  const expBCYr=useMemo(()=>{const m={};txns.filter(t=>t.type==="expense"&&new Date(t.date).getFullYear()===CY).forEach(t=>{m[t.category]=(m[t.category]||0)+t.amount;});return m;},[txns]);

  const backup = useBackup({
    txns, assets, liabs, bdg, curCode: cur.code, dark,
    setTxns, setAssets, setLiabs, setBdg,
    setCur, setDark, getCur,
    driveToken: null, driveFolderId: null,
  });

  const mxBar=Math.max(...mPnl.map(m=>Math.max(m.i,m.e,1)));

  const navTo=id=>{setTab(id);setLiabDet(null);setAssDet(null);};

  const addTx=()=>{
    if(!txF.amount||isNaN(+txF.amount))return;
    setTxns(p=>[{...txF,id:Date.now(),amount:+txF.amount},...p]);
    setShowTx(false);
    setTxF({type:"expense",category:"food",account:"cash",amount:"",note:"",date:todayStr()});
  };

  const saveLiab=()=>{
    const p={...liabF,total:+liabF.total||0,remaining:+liabF.remaining||0,monthly:+liabF.monthly||0,rate:+liabF.rate||0};
    if(!p.name||!p.total)return;
    if(liabMod==="add")setLiabs(prev=>[{...p,id:Date.now()},...prev]);
    else setLiabs(prev=>prev.map(l=>l.id===liabMod.id?{...l,...p}:l));
    setLiabMod(null);
  };

  const saveAss=()=>{
    const p={...assF,value:+assF.value||0,cost:+assF.cost||0,rate:+assF.rate||0};
    if(!p.name||!p.value)return;
    if(assMod==="add")setAssets(prev=>[{...p,id:Date.now()},...prev]);
    else setAssets(prev=>prev.map(a=>a.id===assMod.id?{...a,...p}:a));
    setAssMod(null);
  };

  const doDelete=()=>{
    if(!delConf)return;
    if(delConf.t==="liab"){setLiabs(p=>p.filter(l=>l.id!==delConf.id));setLiabDet(null);}
    if(delConf.t==="ass") {setAssets(p=>p.filter(a=>a.id!==delConf.id));setAssDet(null);}
    setDelConf(null);
  };

  const lf=(k,v)=>setLiabF(f=>({...f,[k]:v}));
  const af=(k,v)=>setAssF(f=>({...f,[k]:v}));

  const dbProps={mode:rMode,setMode:setRMode,month:rMonth,setMonth:setRMonth,from:rFrom,setFrom:setRFrom,to:rTo,setTo:setRTo,label:rLabel,onReport:()=>setShowRpt(true),T};

  /* ═══ PANEL: DASHBOARD ═══ */
  const PanelDash=(
    <div>
      <DateBar {...dbProps}/>
      <div style={{display:"grid",gridTemplateColumns:isD?"repeat(4,1fr)":isT?"repeat(2,1fr)":"repeat(2,1fr)",gap:12,marginBottom:12}}>
        <KpiCard T={T} label="Net Worth"    value={`${netWorth<0?"-":""}${fmt(netWorth)}`}        color={netWorth>=0?T.green:T.red}  icon="🏦" sub={`${cur.flag} ${cur.name}`}/>
        <KpiCard T={T} label="Net Cashflow" value={`${netCF>=0?"+":"-"}${fmt(netCF)}`}            color={netCF>=0?T.green:T.red}     icon="💸" sub={rLabel}/>
        <KpiCard T={T} label="Total Assets" value={fmt(totCash+totAss)}  color={T.teal}  icon="💎" sub={`${assets.length} assets`}  onClick={()=>navTo("assets")}/>
        <KpiCard T={T} label="Liabilities"  value={fmt(totLiab)}         color={T.amber} icon="⚖️" sub={`${liabs.length} debts`}    onClick={()=>navTo("debts")}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:isD?"repeat(3,1fr)":isT?"repeat(3,1fr)":"1fr",gap:12,marginBottom:12}}>
        <KpiCard T={T} label="Income"       value={fmt(totInc)}   color={T.green} icon="▲" sub={rLabel}/>
        <KpiCard T={T} label="Expenses"     value={fmt(totExp)}   color={T.red}   icon="▼" sub={rLabel}/>
        <KpiCard T={T} label="Savings Rate" value={`${savR.toFixed(1)}%`} color={savR>20?T.green:savR>0?T.amber:T.red} icon="📊" sub="of income saved"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:isD?"1fr 1fr":"1fr",gap:12,marginBottom:12}}>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:18,boxShadow:`0 1px 4px ${T.sh}`}}>
          <SecH T={T} label="Monthly Income vs Expense"/>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:120,marginBottom:8}}>
            {mPnl.map((m,i)=>{
              const iH=mxBar?(m.i/mxBar)*100:0, eH=mxBar?(m.e/mxBar)*100:0;
              const active=rMode==="month"&&i===rMonth;
              return(
                <div key={i} onClick={()=>{setRMonth(i);setRMode("month");}}
                  style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",opacity:active?1:0.5,transition:"opacity .15s"}}
                  onMouseEnter={e=>e.currentTarget.style.opacity="1"}
                  onMouseLeave={e=>e.currentTarget.style.opacity=active?"1":"0.5"}>
                  <div style={{display:"flex",alignItems:"flex-end",gap:1.5,height:100,width:"100%"}}>
                    <div style={{flex:1,background:active?T.green:T.green+"70",borderRadius:"3px 3px 0 0",height:`${iH}%`,minHeight:m.i?2:0}}/>
                    <div style={{flex:1,background:active?T.red:T.red+"70",  borderRadius:"3px 3px 0 0",height:`${eH}%`,minHeight:m.e?2:0}}/>
                  </div>
                  <div style={{fontSize:8,color:active?T.accent:T.muted,marginTop:3,fontWeight:active?700:400}}>{m.m}</div>
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:14,justifyContent:"center"}}>
            {[[T.green,"Income"],[T.red,"Expense"]].map(([c,l])=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:T.sub}}>
                <div style={{width:8,height:8,background:c,borderRadius:2}}/>{l}
              </div>
            ))}
          </div>
        </div>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:18,boxShadow:`0 1px 4px ${T.sh}`}}>
          <SecH T={T} label="Expense Breakdown" action="View All" onAction={()=>navTo("ledger")}/>
          {EXP_CATS.filter(c=>expBC[c.id]).sort((a,b)=>(expBC[b.id]||0)-(expBC[a.id]||0)).slice(0,6).map(cat=>{
            const amt=expBC[cat.id]||0, pct=totExp?(amt/totExp)*100:0;
            return(
              <div key={cat.id} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:13}}>{cat.icon}</span>
                    <span style={{fontSize:12,color:T.dim}}>{cat.label}</span>
                  </div>
                  <span style={{fontSize:12,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,color:T.text}}>{fmt(amt)}</span>
                </div>
                <PBar T={T} pct={pct} color={cat.color}/>
              </div>
            );
          })}
          {!Object.keys(expBC).length&&<p style={{color:T.muted,fontSize:12,textAlign:"center",margin:"20px 0"}}>No expenses in period</p>}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:isD?"300px 1fr":"1fr",gap:12}}>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:18,boxShadow:`0 1px 4px ${T.sh}`}}>
          <SecH T={T} label="Accounts"/>
          {ACCOUNTS.map(acc=>(
            <div key={acc.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${T.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:9}}>
                <div style={{width:32,height:32,borderRadius:8,background:acc.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>{acc.icon}</div>
                <span style={{fontSize:13,color:T.dim}}>{acc.label}</span>
              </div>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:acBal[acc.id]>=0?T.green:T.red}}>
                {acBal[acc.id]<0?"-":""}{fmt(acBal[acc.id])}
              </span>
            </div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",paddingTop:10}}>
            <span style={{fontSize:11,fontWeight:700,color:T.sub}}>TOTAL CASH</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:T.acL}}>{fmt(totCash)}</span>
          </div>
        </div>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:18,boxShadow:`0 1px 4px ${T.sh}`}}>
          <SecH T={T} label="Recent Transactions" action="View All" onAction={()=>navTo("ledger")}/>
          {fTxns.slice(0,8).map(t=>{
            const cat=getCat(t.type,t.category), acc=getAcc(t.account);
            return(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${T.border}`}}>
                <div style={{width:32,height:32,borderRadius:8,background:cat.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{cat.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.note||cat.label}</div>
                  <div style={{fontSize:10,color:T.muted}}>{cat.label} · {acc.label} · {t.date}</div>
                </div>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:t.type==="income"?T.green:T.red,flexShrink:0}}>
                  {t.type==="income"?"+":"-"}{fmt(t.amount)}
                </span>
              </div>
            );
          })}
          {!fTxns.length&&<p style={{color:T.muted,fontSize:12,textAlign:"center",margin:"20px 0"}}>No transactions in period</p>}
        </div>
      </div>
    </div>
  );

  /* ═══ PANEL: LEDGER ═══ */
  const PanelLedger=(
    <div>
      <DateBar {...dbProps}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:12}}>
        <KpiCard T={T} label="Income"  value={fmt(totInc)}  color={T.green} icon="▲"/>
        <KpiCard T={T} label="Expense" value={fmt(totExp)}  color={T.red}   icon="▼"/>
        <KpiCard T={T} label="Net"     value={`${netCF>=0?"+":"-"}${fmt(netCF)}`} color={netCF>=0?T.green:T.red} icon="="/>
      </div>
      {!grpTxns.length&&<p style={{color:T.muted,textAlign:"center",padding:"40px 0",fontSize:13}}>No transactions in selected period</p>}
      {grpTxns.map(([date,dayTxns])=>{
        const dI=dayTxns.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
        const dE=dayTxns.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
        const d=new Date(date+"T00:00:00");
        return(
          <div key={date} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:12,fontWeight:600,color:T.dim}}>{d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</span>
              <div style={{display:"flex",gap:10,fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
                {dI>0&&<span style={{color:T.green}}>+{fmt(dI)}</span>}
                {dE>0&&<span style={{color:T.red}}>-{fmt(dE)}</span>}
              </div>
            </div>
            <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
              {dayTxns.map((t,i)=>{
                const cat=getCat(t.type,t.category), acc=getAcc(t.account);
                return(
                  <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:i<dayTxns.length-1?`1px solid ${T.border}`:"none"}}>
                    <div style={{width:34,height:34,borderRadius:9,background:cat.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{cat.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:500,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.note||cat.label}</div>
                      <div style={{fontSize:10,color:T.muted}}>{cat.label} · {acc.icon} {acc.label}</div>
                    </div>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:t.type==="income"?T.green:T.red}}>
                      {t.type==="income"?"+":"-"}{fmt(t.amount)}
                    </span>
                    <button onClick={()=>setTxns(p=>p.filter(x=>x.id!==t.id))}
                      style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 0 0 6px"}}>×</button>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );

  /* ═══ PANEL: ASSETS ═══ */
  const PanelAssets=(()=>{
    if(assDet){
      const a=assets.find(x=>x.id===assDet.id)||assDet, at=getAT(a.type);
      const gain=a.value-(a.cost||a.value), gPct=a.cost?((gain/a.cost)*100):0;
      return(
        <div>
          <button onClick={()=>setAssDet(null)} style={{background:"none",border:"none",color:T.acL,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:14,padding:0}}>← Back to Assets</button>
          <div style={{background:T.hg,border:`1px solid ${at.color}30`,borderRadius:16,padding:20,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
              <div style={{width:50,height:50,borderRadius:13,background:at.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{at.icon}</div>
              <div>
                <div style={{fontSize:19,fontWeight:700,color:T.text}}>{a.name}</div>
                <div style={{fontSize:12,color:T.sub}}>{at.label}{a.rate?` · ${a.rate}% p.a.`:""}</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
              {[["Current Value",fmt(a.value),T.green],["Purchase Price",a.cost?fmt(a.cost):"—",T.dim],["Gain / Loss",`${gain>=0?"+":"-"}${fmt(gain)}`,gain>=0?T.green:T.red],["Return",`${gPct>=0?"+":""}${gPct.toFixed(2)}%`,gain>=0?T.green:T.red]].map(([k,v,c])=>(
                <div key={k} style={{background:T.card2,borderRadius:10,padding:12}}>
                  <div style={{fontSize:9,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:".07em",marginBottom:5}}>{k}</div>
                  <div style={{fontSize:15,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:c}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:14,marginBottom:12}}>
            {[["Bank/Broker",a.bank||a.broker||"—"],["Location",a.loc||"—"],["Matures",a.mDate||"—"],["Started",a.start||"—"],["Notes",a.notes||"—"]].filter(([,v])=>v&&v!=="—").map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${T.border}`}}>
                <span style={{fontSize:11,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em"}}>{k}</span>
                <span style={{fontSize:13,color:T.dim}}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setAssF({...a,value:String(a.value),cost:String(a.cost||""),rate:String(a.rate||"")});setAssMod(a);setAssDet(null);}} style={{flex:1,background:T.accent+"18",border:`1px solid ${T.accent}50`,color:T.accent,borderRadius:10,padding:12,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Edit Asset</button>
            <button onClick={()=>setDelConf({t:"ass",id:a.id})} style={{flex:1,background:T.red+"12",border:`1px solid ${T.red}40`,color:T.red,borderRadius:10,padding:12,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Delete</button>
          </div>
        </div>
      );
    }
    return(
      <div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:12}}>
          <KpiCard T={T} label="Total Value"     value={fmt(totCash+totAss)} color={T.green}/>
          <KpiCard T={T} label="Unrealised Gain" value={`${totGain>=0?"+":"-"}${fmt(totGain)}`} color={totGain>=0?T.green:T.red}/>
          <KpiCard T={T} label="Assets Count"    value={assets.length} color={T.purple}/>
        </div>
        <button onClick={()=>{setAssF({type:"fd",name:"",value:"",cost:"",rate:"",mDate:"",bank:"",start:todayStr(),notes:"",loc:"",broker:"",wallet:"",purity:"",yr:""});setAssMod("add");}}
          style={{width:"100%",background:T.green+"12",border:`1px dashed ${T.green}50`,color:T.green,borderRadius:12,padding:12,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:12,fontFamily:"inherit"}}>
          + Add New Asset
        </button>
        <div style={{display:"grid",gridTemplateColumns:isD?"repeat(2,1fr)":"1fr",gap:10}}>
          {assets.map(a=>{
            const at=getAT(a.type),gain=a.value-(a.cost||a.value),gPct=a.cost?((gain/a.cost)*100):0;
            return(
              <div key={a.id} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:16,cursor:"pointer",transition:"all .2s",boxShadow:`0 1px 3px ${T.sh}`}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=at.color+"60";e.currentTarget.style.boxShadow=`0 6px 20px ${T.shH}`;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.boxShadow=`0 1px 3px ${T.sh}`;}}
                onClick={()=>setAssDet(a)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:38,height:38,borderRadius:10,background:at.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>{at.icon}</div>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:T.text}}>{a.name}</div>
                      <div style={{fontSize:10,color:T.muted}}>{at.label}{a.rate?` · ${a.rate}%`:""}{a.bank?` · ${a.bank}`:""}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:15,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:T.green}}>{fmt(a.value)}</div>
                    {a.cost>0&&<div style={{fontSize:10,color:gain>=0?T.green:T.red}}>{gain>=0?"+":"-"}{fmt(gain)} ({gPct.toFixed(1)}%)</div>}
                  </div>
                </div>
                {a.mDate&&<div style={{fontSize:10,color:T.muted,marginBottom:10}}>📅 Matures: {a.mDate}</div>}
                <div style={{display:"flex",gap:8}} onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>{setAssF({...a,value:String(a.value),cost:String(a.cost||""),rate:String(a.rate||"")});setAssMod(a);}} style={{flex:1,background:T.accent+"14",border:`1px solid ${T.accent}40`,color:T.accent,borderRadius:8,padding:"6px 0",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Edit</button>
                  <button onClick={()=>setDelConf({t:"ass",id:a.id})} style={{flex:1,background:T.red+"10",border:`1px solid ${T.red}35`,color:T.red,borderRadius:8,padding:"6px 0",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Delete</button>
                </div>
              </div>
            );
          })}
        </div>
        {!assets.length&&<p style={{color:T.muted,textAlign:"center",padding:"40px 0",fontSize:13}}>No assets added yet</p>}
      </div>
    );
  })();

  /* ═══ PANEL: LIABILITIES ═══ */
  const PanelDebts=(()=>{
    if(liabDet){
      const l=liabs.find(x=>x.id===liabDet.id)||liabDet, lt=getLT(l.type);
      const paidPct=l.total?Math.min(((l.total-l.remaining)/l.total)*100,100):0;
      return(
        <div>
          <button onClick={()=>setLiabDet(null)} style={{background:"none",border:"none",color:T.acL,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:14,padding:0}}>← Back</button>
          <div style={{background:T.hg,border:`1px solid ${lt.color}30`,borderRadius:16,padding:20,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
              <div style={{width:50,height:50,borderRadius:13,background:lt.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{lt.icon}</div>
              <div>
                <div style={{fontSize:19,fontWeight:700,color:T.text}}>{l.name}</div>
                <div style={{fontSize:12,color:T.sub}}>{lt.label} · {l.rate}% p.a.</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:14}}>
              {[["Total",fmt(l.total)],["Remaining",fmt(l.remaining)],["Monthly",fmt(l.monthly)],["Months Left",l.monthly?Math.ceil(l.remaining/l.monthly):"—"]].map(([k,v])=>(
                <div key={k} style={{background:T.card2,borderRadius:10,padding:12}}>
                  <div style={{fontSize:9,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:".07em",marginBottom:5}}>{k}</div>
                  <div style={{fontSize:15,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:T.text}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:11,color:T.muted,fontWeight:600,marginBottom:5}}>PAYOFF PROGRESS · {paidPct.toFixed(1)}%</div>
            <PBar T={T} pct={paidPct} color={lt.color} h={10}/>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginTop:5}}>
              <span style={{color:T.green}}>Paid: {fmt(l.total-l.remaining)}</span>
              <span style={{color:T.red}}>Left: {fmt(l.remaining)}</span>
            </div>
          </div>
          {l.notes&&<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:14,marginBottom:12,fontSize:13,color:T.dim}}>{l.notes}</div>}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setLiabF({...l,total:String(l.total),remaining:String(l.remaining),monthly:String(l.monthly),rate:String(l.rate)});setLiabMod(l);setLiabDet(null);}} style={{flex:1,background:T.accent+"18",border:`1px solid ${T.accent}50`,color:T.accent,borderRadius:10,padding:12,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Edit</button>
            <button onClick={()=>setDelConf({t:"liab",id:l.id})} style={{flex:1,background:T.red+"12",border:`1px solid ${T.red}40`,color:T.red,borderRadius:10,padding:12,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Delete</button>
          </div>
        </div>
      );
    }
    return(
      <div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:12}}>
          <KpiCard T={T} label="Total Debt"  value={fmt(totLiab)}  color={T.red}/>
          <KpiCard T={T} label="Monthly Due" value={fmt(totMoPay)} color={T.amber}/>
          <KpiCard T={T} label="Debt Count"  value={liabs.length}  color={T.purple}/>
        </div>
        <button onClick={()=>{setLiabF({type:"loan",name:"",total:"",remaining:"",monthly:"",rate:"",start:todayStr(),notes:""});setLiabMod("add");}}
          style={{width:"100%",background:T.red+"10",border:`1px dashed ${T.red}45`,color:T.red,borderRadius:12,padding:12,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:12,fontFamily:"inherit"}}>
          + Add New Liability
        </button>
        <div style={{display:"grid",gridTemplateColumns:isD?"repeat(2,1fr)":"1fr",gap:10}}>
          {liabs.map(l=>{
            const lt=getLT(l.type), paidPct=l.total?Math.min(((l.total-l.remaining)/l.total)*100,100):0;
            return(
              <div key={l.id} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:16,cursor:"pointer",transition:"all .2s",boxShadow:`0 1px 3px ${T.sh}`}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=lt.color+"60";e.currentTarget.style.boxShadow=`0 6px 20px ${T.shH}`;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.boxShadow=`0 1px 3px ${T.sh}`;}}
                onClick={()=>setLiabDet(l)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:38,height:38,borderRadius:10,background:lt.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>{lt.icon}</div>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:T.text}}>{l.name}</div>
                      <div style={{fontSize:10,color:T.muted}}>{lt.label} · {l.rate}% p.a.</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:15,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:T.red}}>{fmt(l.remaining)}</div>
                    <div style={{fontSize:10,color:T.muted}}>Monthly: {fmt(l.monthly)}</div>
                  </div>
                </div>
                <PBar T={T} pct={paidPct} color={lt.color}/>
                <div style={{fontSize:10,color:T.muted,marginTop:4,marginBottom:10}}>{paidPct.toFixed(0)}% paid</div>
                <div style={{display:"flex",gap:8}} onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>{setLiabF({...l,total:String(l.total),remaining:String(l.remaining),monthly:String(l.monthly),rate:String(l.rate)});setLiabMod(l);}} style={{flex:1,background:T.accent+"14",border:`1px solid ${T.accent}40`,color:T.accent,borderRadius:8,padding:"6px 0",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Edit</button>
                  <button onClick={()=>setDelConf({t:"liab",id:l.id})} style={{flex:1,background:T.red+"10",border:`1px solid ${T.red}35`,color:T.red,borderRadius:8,padding:"6px 0",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Delete</button>
                </div>
              </div>
            );
          })}
        </div>
        {!liabs.length&&<p style={{color:T.muted,textAlign:"center",padding:"40px 0",fontSize:13}}>No liabilities added</p>}
      </div>
    );
  })();

  /* ═══ PANEL: BUDGET ═══ */
  const PanelBudget=(
    <div>
      <DateBar {...dbProps}/>
      <div style={{display:"grid",gridTemplateColumns:isD?"repeat(2,1fr)":"1fr",gap:10}}>
        {EXP_CATS.map(cat=>{
          const spent=expBC[cat.id]||0, budget=bdg[cat.id]||0, pct=budget?(spent/budget)*100:0, over=budget&&spent>budget;
          return(
            <div key={cat.id} style={{background:T.card,border:`1px solid ${over?T.red+"50":T.border}`,borderRadius:12,padding:16,boxShadow:`0 1px 3px ${T.sh}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:20}}>{cat.icon}</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:T.text}}>{cat.label}</div>
                    <div style={{fontSize:10,color:T.muted}}>{budget?`${fmt(spent)} of ${fmt(budget)}`:`Spent: ${fmt(spent)}`}</div>
                  </div>
                </div>
                <button onClick={()=>setEditBdg(cat.id)} style={{background:T.accent+"14",border:`1px solid ${T.accent}40`,color:T.accent,borderRadius:7,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                  {budget?"Edit":"Set"}
                </button>
              </div>
              {budget>0&&(
                <>
                  <PBar T={T} pct={pct} color={over?T.red:cat.color} h={8}/>
                  <div style={{fontSize:11,color:over?T.red:T.muted,marginTop:5}}>
                    {over?`⚠ Over budget by ${fmt(spent-budget)}`:`${fmt(budget-spent)} remaining · ${pct.toFixed(0)}% used`}
                  </div>
                </>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );

  /* ═══ PANEL: BALANCE SHEET ═══ */
  const PanelBS=(
    <div>
      <div style={{background:T.hg,border:`1px solid ${T.hb}`,borderRadius:16,padding:20,marginBottom:14}}>
        <div style={{fontSize:10,color:T.muted,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",marginBottom:4}}>Personal Balance Sheet · Net Equity</div>
        <div style={{fontSize:isD?34:26,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:equity>=0?T.green:T.red,letterSpacing:"-1px"}}>
          {equity<0?"-":""}{fmt(equity)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginTop:14}}>
          {[["Cash",totCash,T.acL],["Assets",totAss,T.green],["Liabilities",totLiab,T.red]].map(([k,v,c])=>(
            <div key={k} style={{background:T.card2,borderRadius:10,padding:10,textAlign:"center"}}>
              <div style={{fontSize:9,color:T.sub,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>{k}</div>
              <div style={{fontSize:14,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:c}}>{fmt(v)}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:isD?"1fr 1fr":"1fr",gap:14}}>
        <div>
          <SecH T={T} label="Assets"/>
          <BSBlock T={T} fmt={fmt} title="Cash & Accounts" total={totCash} color={T.acL} icon="💵">
            {ACCOUNTS.map(a=><BSRow key={a.id} T={T} fmt={fmt} label={`${a.icon} ${a.label}`} value={acBal[a.id]||0} color={T.acL} indent/>)}
          </BSBlock>
          {ASSET_TYPES.filter(at=>assets.some(a=>a.type===at.id)).map(at=>{
            const grp=assets.filter(a=>a.type===at.id), tot=grp.reduce((s,a)=>s+a.value,0);
            return(
              <BSBlock key={at.id} T={T} fmt={fmt} title={at.label} total={tot} color={at.color} icon={at.icon}>
                {grp.map(a=>{
                  const g=a.value-(a.cost||a.value);
                  return <BSRow key={a.id} T={T} fmt={fmt} label={a.name} sub={a.cost?`Cost:${fmt(a.cost)} · Gain:${g>=0?"+":""}${fmt(g)}`:"No cost basis"} value={a.value} color={at.color} indent/>;
                })}
              </BSBlock>
            );
          })}
          <div style={{background:T.green+"14",border:`1px solid ${T.green}40`,borderRadius:10,padding:"11px 16px",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontWeight:700,color:T.green,fontSize:13}}>TOTAL ASSETS</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,color:T.green}}>{fmt(totCash+totAss)}</span>
          </div>
        </div>
        <div>
          <SecH T={T} label="Liabilities & Equity"/>
          {LIAB_TYPES.filter(lt=>liabs.some(l=>l.type===lt.id)).map(lt=>{
            const grp=liabs.filter(l=>l.type===lt.id), tot=grp.reduce((s,l)=>s+l.remaining,0);
            return(
              <BSBlock key={lt.id} T={T} fmt={fmt} title={lt.label} total={tot} color={lt.color} icon={lt.icon}>
                {grp.map(l=><BSRow key={l.id} T={T} fmt={fmt} label={l.name} sub={`${l.rate}% p.a. · Monthly:${fmt(l.monthly)}`} value={l.remaining} color={lt.color} indent/>)}
              </BSBlock>
            );
          })}
          {!liabs.length&&<p style={{color:T.muted,textAlign:"center",padding:"16px 0",fontSize:12}}>No liabilities</p>}
          <div style={{background:T.red+"12",border:`1px solid ${T.red}40`,borderRadius:10,padding:"11px 16px",display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontWeight:700,color:T.red,fontSize:13}}>TOTAL LIABILITIES</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,color:T.red}}>{fmt(totLiab)}</span>
          </div>
          <BSBlock T={T} fmt={fmt} title="Equity" total={equity} color={equity>=0?T.green:T.red} icon="🏛️">
            <BSRow T={T} fmt={fmt} label="Total Assets"      value={totCash+totAss} color={T.green}/>
            <BSRow T={T} fmt={fmt} label="Total Liabilities" value={totLiab}        color={T.red}/>
          </BSBlock>
          <div style={{background:T.accent+"14",border:`1px solid ${T.accent}40`,borderRadius:10,padding:"11px 16px",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontWeight:700,color:T.accent,fontSize:13}}>LIAB + EQUITY</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,color:T.accent}}>{fmt(totLiab+equity)}</span>
          </div>
        </div>
      </div>
    </div>
  );

  /* ═══ PANEL: P&L ═══ */
  const mIntCost=liabs.reduce((s,l)=>s+(l.remaining*l.rate/100/12),0);
  const PanelPnL=(
    <div>
      <DateBar {...dbProps}/>
      <div style={{background:T.hg,border:`1px solid ${T.hb}`,borderRadius:16,padding:20,marginBottom:14}}>
        <div style={{fontSize:10,color:T.muted,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",marginBottom:4}}>Profit & Loss · {CY}</div>
        <div style={{fontSize:isD?34:26,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:ytdN>=0?T.green:T.red,letterSpacing:"-1px"}}>
          {ytdN>=0?"+":"-"}{fmt(ytdN)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginTop:14}}>
          {[["YTD Income",fmt(ytdI),T.green],["YTD Expense",fmt(ytdE),T.red],["Savings Rate",`${(ytdI>0?ytdN/ytdI*100:0).toFixed(1)}%`,T.acL]].map(([k,v,c])=>(
            <div key={k} style={{background:T.card2,borderRadius:10,padding:10,textAlign:"center"}}>
              <div style={{fontSize:9,color:T.sub,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>{k}</div>
              <div style={{fontSize:14,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:c}}>{v}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:isD?"1fr 1fr":"1fr",gap:14}}>
        <div>
          <SecH T={T} label="Income Statement"/>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden",marginBottom:10}}>
            <div style={{padding:"9px 14px",background:T.green+"12",borderBottom:`1px solid ${T.green}20`}}><span style={{fontSize:11,fontWeight:700,color:T.green}}>INCOME</span></div>
            <div style={{padding:"0 14px"}}>
              {INC_CATS.filter(c=>incBCYr[c.id]).map(cat=><PnLRow key={cat.id} T={T} label={`${cat.icon} ${cat.label}`} value={fmt(incBCYr[cat.id])} color={T.green} indent/>)}
              {!Object.keys(incBCYr).length&&<p style={{color:T.muted,fontSize:11,padding:"10px 0",margin:0}}>No income recorded</p>}
            </div>
            <div style={{padding:"9px 14px",borderTop:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",background:T.green+"08"}}>
              <span style={{fontSize:12,fontWeight:700,color:T.green}}>TOTAL INCOME</span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:T.green}}>{fmt(ytdI)}</span>
            </div>
          </div>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden",marginBottom:10}}>
            <div style={{padding:"9px 14px",background:T.red+"12",borderBottom:`1px solid ${T.red}20`}}><span style={{fontSize:11,fontWeight:700,color:T.red}}>EXPENSES</span></div>
            <div style={{padding:"0 14px"}}>
              {EXP_CATS.filter(c=>expBCYr[c.id]).map(cat=><PnLRow key={cat.id} T={T} label={`${cat.icon} ${cat.label}`} value={fmt(expBCYr[cat.id])} color={T.red} indent/>)}
              {!Object.keys(expBCYr).length&&<p style={{color:T.muted,fontSize:11,padding:"10px 0",margin:0}}>No expenses recorded</p>}
            </div>
            <div style={{padding:"9px 14px",borderTop:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",background:T.red+"08"}}>
              <span style={{fontSize:12,fontWeight:700,color:T.red}}>TOTAL EXPENSES</span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:T.red}}>{fmt(ytdE)}</span>
            </div>
          </div>
          <div style={{background:T.card,border:`1px solid ${ytdN>=0?T.green:T.red}40`,borderRadius:12,overflow:"hidden"}}>
            <div style={{padding:"0 14px"}}>
              <PnLRow T={T} label="Total Income"          value={`+${fmt(ytdI)}`}              color={T.green}/>
              <PnLRow T={T} label="Total Expenses"        value={`-${fmt(ytdE)}`}              color={T.red}/>
              <PnLRow T={T} label="Interest on Debts"     value={`-${fmt(mIntCost)}`}          color={T.red}/>
              <PnLRow T={T} label="Asset Gains (Unreal.)" value={`+${fmt(Math.max(totGain,0))}`} color={T.green}/>
            </div>
            <div style={{padding:"11px 14px",background:ytdN>=0?T.green+"14":T.red+"14",display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:13,fontWeight:700,color:ytdN>=0?T.green:T.red}}>NET PROFIT / LOSS</span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:16,fontWeight:700,color:ytdN>=0?T.green:T.red}}>{ytdN>=0?"+":"-"}{fmt(ytdN)}</span>
            </div>
          </div>
        </div>
        <div>
          <SecH T={T} label="Monthly Breakdown"/>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:16,marginBottom:10}}>
            <div style={{display:"flex",alignItems:"flex-end",gap:4,height:110,marginBottom:8}}>
              {mPnl.map((m,i)=>{
                const iH=mxBar?(m.i/mxBar)*100:0, eH=mxBar?(m.e/mxBar)*100:0;
                const active=rMode==="month"&&i===rMonth;
                return(
                  <div key={i} onClick={()=>{setRMonth(i);setRMode("month");}}
                    style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",opacity:active?1:0.5,transition:"opacity .15s"}}
                    onMouseEnter={e=>e.currentTarget.style.opacity="1"}
                    onMouseLeave={e=>e.currentTarget.style.opacity=active?"1":"0.5"}>
                    <div style={{display:"flex",alignItems:"flex-end",gap:1.5,height:95,width:"100%"}}>
                      <div style={{flex:1,background:T.green,borderRadius:"3px 3px 0 0",height:`${iH}%`,minHeight:m.i?2:0}}/>
                      <div style={{flex:1,background:T.red,  borderRadius:"3px 3px 0 0",height:`${eH}%`,minHeight:m.e?2:0}}/>
                    </div>
                    <div style={{fontSize:8,color:active?T.accent:T.muted,marginTop:3,fontWeight:active?700:400}}>{m.m}</div>
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"8px 14px",background:T.card2,borderBottom:`1px solid ${T.border}`}}>
              {["Month","Income","Expense","Net"].map(h=><div key={h} style={{fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:".06em"}}>{h}</div>)}
            </div>
            <div style={{maxHeight:250,overflowY:"auto"}}>
              {mPnl.map((m,i)=>{
                const active=rMode==="month"&&i===rMonth;
                return(
                  <div key={i} onClick={()=>{setRMonth(i);setRMode("month");}}
                    style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"8px 14px",background:active?T.accent+"10":"transparent",borderBottom:`1px solid ${T.border}`,cursor:"pointer"}}>
                    <span style={{fontSize:12,fontWeight:active?700:400,color:active?T.accent:T.dim}}>{MONTHS[i]}</span>
                    <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:m.i?T.green:T.muted}}>{m.i?fmt(m.i):"—"}</span>
                    <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:m.e?T.red:T.muted}}>{m.e?fmt(m.e):"—"}</span>
                    <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:m.n>0?T.green:m.n<0?T.red:T.muted}}>{m.n?`${m.n>0?"+":"-"}${fmt(m.n)}`:"—"}</span>
                  </div>
                );
              })}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"8px 14px",background:T.card2,borderTop:`1px solid ${T.border}`}}>
              <span style={{fontSize:11,fontWeight:700,color:T.sub}}>YTD</span>
              <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:T.green}}>{fmt(ytdI)}</span>
              <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:T.red}}>{fmt(ytdE)}</span>
              <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:ytdN>=0?T.green:T.red}}>{ytdN>=0?"+":"-"}{fmt(ytdN)}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  const PANELS={dash:PanelDash,ledger:PanelLedger,assets:PanelAssets,debts:PanelDebts,budget:PanelBudget,bs:PanelBS,pnl:PanelPnL};

  /* ═══ RENDER ═══ */
  return(
    <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:T.bg,minHeight:"100vh",color:T.text,display:"flex",flexDirection:isD?"row":"column",transition:"background .3s,color .3s"}}>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
      <style>{`
        *{box-sizing:border-box;scrollbar-width:thin;scrollbar-color:${T.sc} transparent;}
        *::-webkit-scrollbar{width:5px;height:5px;}
        *::-webkit-scrollbar-thumb{background:${T.sc};border-radius:99px;}
        input[type=number]{-moz-appearance:textfield;}
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
        input::placeholder{color:${T.muted};}
        button{font-family:inherit;}
      `}</style>

      {/* ── SIDEBAR (desktop) ── */}
      {isD&&(
        <aside style={{width:230,background:T.sidebar,borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column",position:"sticky",top:0,height:"100vh",flexShrink:0,boxShadow:`2px 0 12px ${T.sh}`,transition:"background .3s"}}>
          <div style={{padding:"20px 18px 16px",borderBottom:`1px solid ${T.border}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{width:34,height:34,background:`linear-gradient(135deg,${T.accent},${T.purple})`,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,color:"#fff"}}>₿</div>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:T.text}}>Finance by Self</div>
                <div style={{fontSize:9,color:T.muted,textTransform:"uppercase",letterSpacing:".05em"}}>Personal Finance</div>
              </div>
            </div>
            <div style={{background:T.card2,border:`1px solid ${T.border}`,borderRadius:9,padding:"8px 12px"}}>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:17,fontWeight:600,color:T.accent,letterSpacing:"0.04em"}}>{clock}</div>
              <div style={{fontSize:10,color:T.muted,marginTop:2}}>{dstr}</div>
            </div>
          </div>
          <nav style={{flex:1,padding:"10px",overflowY:"auto"}}>
            {NAV_ITEMS.map(n=>(
              <button key={n.id} onClick={()=>navTo(n.id)}
                style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 11px",borderRadius:9,
                  background:tab===n.id?T.accent+"18":"transparent",border:`1px solid ${tab===n.id?T.accent+"50":"transparent"}`,
                  color:tab===n.id?T.accent:T.sub,fontSize:13,fontWeight:tab===n.id?600:400,cursor:"pointer",
                  marginBottom:2,textAlign:"left",transition:"all .15s"}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:14,width:18,textAlign:"center",opacity:.8}}>{n.icon}</span>
                {n.label}
              </button>
            ))}
          </nav>
          <div style={{padding:"12px 10px",borderTop:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:8}}>
            <ThemeToggle isDark={dark} onToggle={()=>setDark(d=>!d)} T={T}/>
            <button onClick={()=>setShowCur(true)}
              style={{display:"flex",alignItems:"center",gap:8,padding:"8px 11px",borderRadius:8,background:T.card2,border:`1px solid ${T.border}`,color:T.dim,fontSize:12,fontWeight:500,cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:16}}>{cur.flag}</span>
              <span style={{flex:1}}>{cur.code} — {cur.name}</span>
              <span style={{fontSize:10,color:T.muted}}>▼</span>
            </button>
            <button onClick={()=>setShowTx(true)}
              style={{background:`linear-gradient(135deg,${T.accent},${T.purple})`,border:"none",color:"#fff",borderRadius:9,padding:"9px 0",fontSize:13,fontWeight:600,cursor:"pointer"}}>
              + Add Transaction
            </button>
            <button onClick={()=>setShowBackup(true)}
              style={{display:"flex",alignItems:"center",gap:8,padding:"8px 11px",borderRadius:8,background:T.card2,border:`1px solid ${T.border}`,color:T.dim,fontSize:12,fontWeight:500,cursor:"pointer",width:"100%"}}>
              <span style={{fontSize:16}}>💾</span> Storage & Backup
            </button>
            <button onClick={()=>setShowAbout(true)}
              style={{background:"none",border:"none",color:T.muted,fontSize:10,cursor:"pointer",padding:"4px 0",letterSpacing:".02em",lineHeight:1.6,textAlign:"center",width:"100%"}}>
              Finance by Self · v1.0.0<br/>© 2026 All Rights Reserved
            </button>
          </div>
        </aside>
      )}

      {/* ── MAIN AREA ── */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,overflow:"hidden"}}>
        {/* Mobile/Tablet top bar */}
        {!isD&&(
          <div style={{background:T.sidebar,padding:"12px 14px 0",borderBottom:`1px solid ${T.border}`,position:"sticky",top:0,zIndex:10,boxShadow:`0 2px 8px ${T.sh}`,transition:"background .3s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:28,height:28,background:`linear-gradient(135deg,${T.accent},${T.purple})`,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#fff"}}>₿</div>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:T.text}}>Finance by Self</div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.accent}}>{clock}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <button onClick={()=>setDark(d=>!d)} style={{background:T.card2,border:`1px solid ${T.border}`,color:T.text,borderRadius:7,padding:"5px 9px",fontSize:14,cursor:"pointer"}}>{dark?"🌙":"☀️"}</button>
                <button onClick={()=>setShowBackup(true)} style={{background:T.card2,border:`1px solid ${T.border}`,color:T.dim,borderRadius:7,padding:"5px 9px",fontSize:12,cursor:"pointer"}}>💾</button>
                <button onClick={()=>setShowAbout(true)} style={{background:T.card2,border:`1px solid ${T.border}`,color:T.muted,borderRadius:7,padding:"5px 9px",fontSize:13,cursor:"pointer"}}>ℹ️</button>
                <button onClick={()=>setShowCur(true)} style={{background:T.card2,border:`1px solid ${T.border}`,color:T.dim,borderRadius:7,padding:"5px 9px",fontSize:11,fontWeight:500,cursor:"pointer"}}>{cur.flag} {cur.code}</button>
                <button onClick={()=>setShowTx(true)} style={{background:`linear-gradient(135deg,${T.accent},${T.purple})`,border:"none",color:"#fff",borderRadius:7,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Add</button>
